<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Выпуск 2026</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Toolbar -->
      <div id="toolbar">
        <div class="toolbar-group">
          <button
            id="tool-pen"
            class="tool-btn active"
            data-tool="pen"
            title="Кисть"
          >
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
              />
            </svg>
          </button>
          <button
            id="tool-eraser"
            class="tool-btn"
            data-tool="eraser"
            title="Ластик"
          >
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 01-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0M4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.54-4.95-4.95-4.95 4.96z"
              />
            </svg>
          </button>
          <button
            id="tool-image"
            class="tool-btn"
            data-tool="image"
            title="Изображение (JPG/PNG/GIF/WebP, макс. 2 МБ)"
          >
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
              />
            </svg>
          </button>
          <input
            type="file"
            id="image-input"
            accept="image/jpeg,image/png,image/gif,image/webp"
            style="display: none"
          />

          <button id="tool-text" class="tool-btn" data-tool="text" title="Текст">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M5 4h14v4h-4v12h-2V8H9V4H5z" />
            </svg>
          </button>
        </div>
        <div class="toolbar-group" id="color-group">
          <label for="color-picker" class="tool-label">Цвет</label>
          <input type="color" id="color-picker" value="#ff0000" />
        </div>
        <div class="toolbar-group" id="size-group">
          <label for="size-slider" class="tool-label" id="size-label"
            >Толщина: 5</label
          >
          <input type="range" id="size-slider" min="1" max="100" value="5" />
        </div>
        <div class="toolbar-group undo-redo-group">
          <button id="btn-undo" class="tool-btn" title="Отмена (Ctrl+Z)" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"
              />
            </svg>
          </button>
          <button
            id="btn-redo"
            class="tool-btn"
            title="Повтор (Ctrl+Shift+Z)"
            disabled
          >
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path
                fill="currentColor"
                d="M11.5 8c-4.65 0-8.58 3.03-9.97 7.22l2.37.78c1.05-3.19 4.06-5.5 7.6-5.5 1.96 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6C16.55 9 14.15 8 11.5 8z"
              />
            </svg>
          </button>
        </div>
        <div class="toolbar-group zoom-info">
          <span id="zoom-level">100%</span>
        </div>
      </div>

      <!-- Canvas container -->
      <div id="canvas-container">
        <canvas id="draw-canvas"></canvas>
      </div>

      <!-- Countdown -->
      <div id="countdown">
        <span id="countdown-value">00:00:00</span>
        <span id="countdown-label">до выпуска</span>
      </div>

      <!-- Info overlay -->
      <div id="info-overlay">
        <span class="hint-desktop">Зажмите <kbd>Пробел</kbd> + перетаскивание для перемещения | Колесико для масштабирования</span>
        <span class="hint-touch">👆 Рисование одним пальцем, ✌️ Перемещение/масштаб двумя</span>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/countdown.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/undo-redo.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
