<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Воспроизведение — Выпуск 2026</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* Render page specific styles */
      #render-app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        background: #1e1e2e;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #render-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        background: #252538;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
        gap: 12px;
        flex-wrap: wrap;
      }

      #render-header h1 {
        font-size: 16px;
        margin: 0;
        white-space: nowrap;
      }

      .render-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .render-btn {
        background: #3a3a55;
        border: none;
        color: #eee;
        width: 36px;
        height: 36px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: background 0.15s;
      }
      .render-btn:hover { background: #4a4a6a; }
      .render-btn:disabled { opacity: 0.4; cursor: default; }
      .render-btn.primary { background: #2196f3; }
      .render-btn.primary:hover { background: #1976d2; }
      .render-btn.danger { background: #d32f2f; }
      .render-btn.danger:hover { background: #b71c1c; }
      .render-btn.success { background: #388e3c; }
      .render-btn.success:hover { background: #2e7d32; }

      .render-label {
        font-size: 13px;
        color: #aaa;
        margin: 0 4px;
      }

      .render-select {
        background: #3a3a55;
        color: #eee;
        border: 1px solid #555;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 13px;
      }

      #progress-info {
        font-size: 12px;
        color: #999;
        white-space: nowrap;
      }

      #canvas-container {
        flex: 1;
        overflow: hidden;
        position: relative;
        cursor: grab;
      }
      #canvas-container.panning {
        cursor: grabbing;
      }
      #draw-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #render-footer {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 16px;
        background: #252538;
        border-top: 1px solid #333;
        flex-shrink: 0;
        font-size: 12px;
        color: #999;
      }

      #progress-bar-wrapper {
        flex: 1;
        height: 6px;
        background: #3a3a55;
        border-radius: 3px;
        overflow: hidden;
        cursor: pointer;
        position: relative;
      }
      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #2196f3, #64b5f6);
        border-radius: 3px;
        transition: width 0.1s linear;
      }

      #recording-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #555;
        display: inline-block;
        margin-right: 4px;
      }
      #recording-indicator.active {
        background: #f44336;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* Info overlay on canvas when no data */
      #render-empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #666;
        pointer-events: none;
      }

      .back-link {
        color: #64b5f6;
        text-decoration: none;
        font-size: 13px;
        margin-left: 8px;
      }
      .back-link:hover { text-decoration: underline; }

      @media (max-width: 600px) {
        #render-header { flex-direction: column; align-items: stretch; }
        .render-controls { justify-content: center; }
        #progress-info { text-align: center; }
      }
    </style>
  </head>
  <body>
    <div id="render-app">
      <!-- Header with controls -->
      <div id="render-header">
        <div style="display:flex; align-items:center; gap:8px;">
          <h1>⏪ Воспроизведение</h1>
          <span id="progress-info">0 / 0 действий</span>
          <a href="/" class="back-link">← На главную</a>
        </div>

        <div class="render-controls">
          <button id="btn-play" class="render-btn primary" title="Воспроизвести / Пауза">▶</button>
          <button id="btn-reset" class="render-btn" title="Сбросить">⟲</button>

          <span class="render-label">Скорость:</span>
          <select id="speed-select" class="render-select">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="5">5×</option>
            <option value="10">10×</option>
            <option value="50">50×</option>
            <option value="100">100×</option>
          </select>

          <button id="btn-record" class="render-btn danger" title="Запись видео (WebM)">
            <span id="recording-indicator"></span>Запись
          </button>
        </div>
      </div>

      <!-- Canvas container -->
      <div id="canvas-container">
        <canvas id="draw-canvas"></canvas>
        <div id="render-empty">Загрузка данных...</div>
      </div>

      <!-- Footer with progress bar -->
      <div id="render-footer">
        <button id="btn-skip-prev" class="render-btn" title="Предыдущее действие" style="width:28px;height:28px;font-size:14px;">⏮</button>
        <span id="time-elapsed">00:00</span>
        <div id="progress-bar-wrapper">
          <div id="progress-bar-fill"></div>
        </div>
        <span id="time-total">00:00</span>
        <button id="btn-skip-next" class="render-btn" title="Следующее действие" style="width:28px;height:28px;font-size:14px;">⏭</button>
        <span id="action-count-label">0 / 0</span>
      </div>
    </div>

    <script src="js/render.js"></script>
  </body>
</html>
